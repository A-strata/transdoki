{% extends "base.html" %}
{% load static %}

{% block title %}Счета — Трансдоки{% endblock %}

{% block head %}
<link rel="stylesheet" href="{% static 'invoicing/css/invoice_list.css' %}">
{% endblock %}

{% block content %}
<section class="invoices-page">

    <form method="get" class="list-toolbar" data-invoice-filters>

        <div class="toolbar-zone-title">
            <h1>Счета</h1>
        </div>

        <div class="toolbar-zone-filters">
            <div class="search-field-wrap{% if filters.q %} is-filtered{% endif %}">
                <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <input type="text"
                       name="q"
                       class="search-input"
                       value="{{ filters.q }}"
                       placeholder="Номер, заказчик или сумма…"
                       data-filter="q"
                       autocomplete="off">
                <button type="button" class="search-clear" data-search-clear aria-label="Очистить поиск">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>

            <button type="button"
                    class="tms-btn tms-btn-secondary visibility-toggle"
                    data-calendar-toggle
                    aria-expanded="false"
                    title="Фильтр по дате">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>

            <div class="date-range-expand" data-calendar-fields>
                <input type="date"
                       name="date_from"
                       class="filter-input"
                       value="{{ filters.date_from }}"
                       data-filter="date_from">
                <span class="date-range-sep">&mdash;</span>
                <input type="date"
                       name="date_to"
                       class="filter-input"
                       value="{{ filters.date_to }}"
                       data-filter="date_to">
            </div>

            <div class="active-filters" data-active-filters></div>
        </div>

    </form>

    <div data-list-content>
        {% include "invoicing/invoice_list_table.html" %}
    </div>

</section>
{% endblock %}

{% block extra_js %}
<script defer src="{% static 'invoicing/js/invoice_list.js' %}"></script>
<script defer src="{% static 'js/row_click.js' %}"></script>
{% endblock %}
