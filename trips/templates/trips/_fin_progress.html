<div class="fin-progress">
    <div class="fin-step {% if status == 'open' or status == 'calculated' or status == 'invoiced' or status == 'paid' %}is-done{% endif %}">
        <span class="fin-step-dot"></span>
        <span class="fin-step-label">Открыт</span>
    </div>
    <div class="fin-step {% if status == 'calculated' or status == 'invoiced' or status == 'paid' %}is-done{% endif %}">
        <span class="fin-step-dot"></span>
        <span class="fin-step-label">Зафиксирован</span>
    </div>
    <div class="fin-step {% if status == 'invoiced' or status == 'paid' %}is-done{% endif %}">
        <span class="fin-step-dot"></span>
        <span class="fin-step-label">Документы</span>
    </div>
    <div class="fin-step {% if status == 'paid' %}is-done{% endif %}">
        <span class="fin-step-dot"></span>
        <span class="fin-step-label">Оплачен</span>
    </div>
</div>
