{% if fin_status != 'open' %}
    <p class="kv-value kv-total--fixed">{{ total_fixed }} ₽</p>
{% elif total_calc %}
    <p class="kv-value kv-total--calc">{{ total_calc }} ₽ <span class="fin-calc-hint">расчётно</span></p>
    <form method="post" action="{% url 'trips:fix_finance' object.pk %}" class="fix-finance-form">
        {% csrf_token %}
        <input type="hidden" name="side" value="{{ side }}">
        <button type="submit" class="tms-btn tms-btn-fix tms-btn-sm">Зафиксировать</button>
    </form>
{% else %}
    <p class="kv-value">—</p>
{% endif %}
