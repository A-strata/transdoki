name: Deploy Django with Poetry

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/projects/transdoki
            git fetch origin main
            git reset --hard origin/main
            /home/deploy/.local/bin/poetry install --no-interaction --sync
            /home/deploy/.local/bin/poetry run python manage.py migrate --noinput
            /home/deploy/.local/bin/poetry run python manage.py collectstatic --noinput
            sudo systemctl restart transdoki
