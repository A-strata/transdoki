{% extends "base.html" %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'vehicles/css/vehicle_confirm_delete.css' %}">
{% endblock %}

{% block content %}
<section class="delete-page">
    <div class="delete-card">
        <h1 class="delete-title">Удаление транспортного средства</h1>
        <p class="delete-text">
            Вы уверены, что хотите удалить:
            <br>
            <span class="delete-target">«{{ object }}»</span>?
        </p>
        <div class="delete-warning">Это действие нельзя отменить.</div>
        <form method="post">
            {% csrf_token %}
            <div class="actions">
                <button type="submit" class="tms-btn tms-btn-danger">Удалить</button>
                <a href="{% url 'vehicles:list' %}" class="tms-btn tms-btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
