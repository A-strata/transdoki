{% extends "base.html" %}
{% load static %}

{% block title %}Договоры — Трансдоки{% endblock %}

{% block head %}
<link rel="stylesheet" href="{% static 'contracts/css/contract_list.css' %}">
{% endblock %}

{% block content %}
<section class="list-page contracts-page">
    <div class="list-toolbar">
        <div class="list-toolbar-left">
            <h1>Договоры</h1>
        </div>
        <div class="list-toolbar-right">
            <div class="search-field-wrap{% if filters.q %} is-filtered{% endif %}">
                <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <input type="text"
                       class="search-input"
                       placeholder="Номер или контрагент…"
                       value="{{ filters.q }}"
                       data-search-input
                       autocomplete="off">
                <button type="button" class="search-clear" data-search-clear aria-label="Очистить поиск">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <div class="filter-inline">
                <label class="filter-field">
                    <span class="filter-label">Статус</span>
                    <select class="filter-select" data-filter-status>
                        <option value="">Все</option>
                        {% for value, label in status_choices %}
                            <option value="{{ value }}" {% if filters.status == value %}selected{% endif %}>{{ label }}</option>
                        {% endfor %}
                    </select>
                </label>
            </div>
            <a href="{% url 'contracts:template_settings' %}" class="tms-btn tms-btn-secondary tms-btn-sm">Шаблоны документов</a>
            <a href="{% url 'contracts:create' %}" class="tms-btn tms-btn-primary tms-btn-add">+ Создать договор</a>
        </div>
    </div>

    <div data-list-content>
        {% include "contracts/contract_list_table.html" %}
    </div>

</section>
{% endblock %}

{% block extra_js %}
<script defer src="{% static 'js/row_click.js' %}"></script>
<script src="{% static 'contracts/js/contract_list.js' %}"></script>
{% endblock %}
