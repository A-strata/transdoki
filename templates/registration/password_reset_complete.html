{% extends "base.html" %}

{% block content %}
<style>
    .auth-page { max-width: 460px; margin: 0 auto; padding-top: 12px; }
    .auth-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 8px 24px rgba(15,23,42,.06); padding: 18px; }
    .auth-title { margin: 0 0 6px; font-size: clamp(1.2rem, 1.8vw, 1.5rem); line-height: 1.2; }
</style>

<section class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Пароль изменён</h1>
        <p style="color:#374151; font-size:.95rem; margin:12px 0 16px;">
            Пароль успешно установлен. Теперь вы можете войти.
        </p>
        <a href="{% url 'login' %}"
           style="display:block; text-align:center; width:100%; min-height:40px; line-height:40px; border-radius:10px; background:#2563eb; color:#fff; font-weight:600; text-decoration:none; font-size:.9rem; box-sizing:border-box;">
            Войти
        </a>
    </div>
</section>
{% endblock %}
