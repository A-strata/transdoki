{% extends "base.html" %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'accounts/css/auth.css' %}">
{% endblock %}
{% block content %}

<section class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Пароль изменён</h1>
        <p class="auth-msg">
            Пароль успешно установлен. Теперь вы можете войти.
        </p>
        <div class="auth-actions">
            <a href="{% url 'login' %}" class="tms-btn tms-btn-primary">Войти</a>
        </div>
    </div>
</section>
{% endblock %}
