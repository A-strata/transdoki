{% extends "base.html" %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'accounts/css/auth.css' %}">
{% endblock %}
{% block content %}

<section class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Восстановление пароля</h1>
        <p class="auth-subtitle">Укажите email — мы отправим ссылку для сброса пароля</p>

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="field">
                <label for="id_email">Email</label>
                <input type="email" name="email" id="id_email" autocomplete="email" required>
            </div>
            <div class="auth-actions">
                <button type="submit" class="tms-btn tms-btn-primary">Отправить ссылку</button>
            </div>
        </form>

        <p class="auth-footer">
            <a href="{% url 'login' %}" class="auth-footer-link">← Вернуться ко входу</a>
        </p>
    </div>
</section>
{% endblock %}
