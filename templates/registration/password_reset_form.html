{% extends "base.html" %}

{% block content %}
<style>
    .auth-page { max-width: 460px; margin: 0 auto; padding-top: 12px; }
    .auth-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 8px 24px rgba(15,23,42,.06); padding: 18px; }
    .auth-title { margin: 0 0 6px; font-size: clamp(1.2rem, 1.8vw, 1.5rem); line-height: 1.2; letter-spacing: -.01em; }
    .auth-subtitle { margin: 0 0 14px; color: #6b7280; font-size: .92rem; }
    .field { margin-bottom: 12px; }
    .field label { display: inline-block; margin-bottom: 6px; font-size: .9rem; font-weight: 600; color: #374151; }
    .field input { width: 100%; border: 1px solid #e5e7eb; border-radius: 10px; background: #fff; color: #111827; padding: 10px 12px; font-size: .95rem; transition: border-color .2s ease, box-shadow .2s ease; box-sizing: border-box; }
    .field input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
    .auth-actions { margin-top: 16px; }
    .tms-btn { width: 100%; min-height: 40px; border-radius: 10px; border: 1px solid transparent; padding: 0 18px; font-size: .9rem; font-weight: 600; cursor: pointer; transition: background .2s ease; }
    .tms-btn-primary { background: #2563eb; border-color: #2563eb; color: #fff; }
    .tms-btn-primary:hover { background: #1d4ed8; }
    .auth-footer { margin-top: 14px; color: #6b7280; font-size: .9rem; text-align: center; }
    .auth-link { color: #2563eb; font-weight: 600; text-decoration: none; }
    .auth-link:hover { text-decoration: underline; }
</style>

<section class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Восстановление пароля</h1>
        <p class="auth-subtitle">Укажите email — мы отправим ссылку для сброса пароля</p>

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="field">
                <label for="id_email">Email</label>
                <input type="email" name="email" id="id_email" autocomplete="email" required>
            </div>
            <div class="auth-actions">
                <button type="submit" class="tms-btn tms-btn-primary">Отправить ссылку</button>
            </div>
        </form>

        <p class="auth-footer">
            <a href="{% url 'login' %}" class="auth-link" style="font-weight:400;color:#6b7280;">← Вернуться ко входу</a>
        </p>
    </div>
</section>
{% endblock %}
