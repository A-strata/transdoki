{% extends "base.html" %}
{% load static %}

{% block head %}
<link rel="stylesheet" href="{% static 'accounts/css/auth.css' %}">
{% endblock %}
{% block content %}

<section class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Письмо отправлено</h1>
        <p class="auth-msg">
            Если указанный email зарегистрирован в системе, вы получите письмо со ссылкой для сброса пароля.
            Проверьте папку «Спам», если письмо не пришло.
        </p>
        <p class="auth-footer">
            <a href="{% url 'login' %}" class="auth-footer-link">← Вернуться ко входу</a>
        </p>
    </div>
</section>
{% endblock %}
