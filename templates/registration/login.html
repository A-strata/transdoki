{% extends "base.html" %}

{% block content %}
<style>
    .auth-page {
        max-width: 460px;
        margin: 0 auto;
        padding-top: 12px;
    }

    .auth-card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
        padding: 18px;
    }

    .auth-title {
        margin: 0 0 6px;
        font-size: clamp(1.2rem, 1.8vw, 1.5rem);
        line-height: 1.2;
        letter-spacing: -0.01em;
    }

    .auth-subtitle {
        margin: 0 0 14px;
        color: #6b7280;
        font-size: 0.92rem;
    }

    .form-errors {
        margin-bottom: 12px;
        padding: 10px 12px;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 10px;
    }

    .form-errors p {
        margin: 0;
        color: #991b1b;
        font-size: 0.88rem;
        text-align: center;
    }

    .field {
        margin-bottom: 12px;
    }

    .field label {
        display: inline-block;
        margin-bottom: 6px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #374151;
    }

    .field input {
        width: 100%;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #fff;
        color: #111827;
        padding: 10px 12px;
        font-size: 0.95rem;
        transition: border-color .2s ease, box-shadow .2s ease;
        box-sizing: border-box;
    }

    .field input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .auth-actions {
        display: flex;
        margin-top: 16px;
    }

    .tms-btn {
        width: 100%;
        min-height: 40px;
        border-radius: 10px;
        border: 1px solid transparent;
        padding: 0 14px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: background .2s ease, border-color .2s ease;
    }

    .tms-btn-primary {
        background: #2563eb;
        border-color: #2563eb;
        color: #fff;
    }

    .tms-btn-primary:hover {
        background: #1d4ed8;
        border-color: #1d4ed8;
    }

    .auth-footer {
        margin-top: 14px;
        color: #6b7280;
        font-size: 0.9rem;
        text-align: center;
    }

    .auth-link {
        color: #2563eb;
        font-weight: 600;
        text-decoration: none;
    }

    .auth-link:hover {
        text-decoration: underline;
    }

    @media (max-width: 520px) {
        .auth-card {
            padding: 14px;
        }
    }
</style>

<section class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Вход</h1>
        <p class="auth-subtitle">Войдите в аккаунт TMS</p>

        <form method="post" novalidate>
            {% csrf_token %}

            {% if form.errors %}
                <div class="form-errors" role="alert">
                    <p>Неверное имя пользователя или пароль</p>
                </div>
            {% endif %}

            <div class="field">
                <label for="id_username">Email или логин</label>
                <input type="text" name="username" id="id_username" required autocomplete="username">
            </div>

            <div class="field">
                <label for="id_password">Пароль</label>
                <input type="password" name="password" id="id_password" required autocomplete="current-password">
            </div>

            {% if next %}
                <input type="hidden" name="next" value="{{ next }}">
            {% endif %}

            <div class="auth-actions">
                <button type="submit" class="tms-btn tms-btn-primary">Войти</button>
            </div>
        </form>

        <p class="auth-footer">
            <a href="{% url 'password_reset' %}" class="auth-link" style="font-weight:400;">Забыли пароль?</a>
        </p>
        <p class="auth-footer">
            Нет аккаунта?
            <a href="{% url 'accounts:register' %}" class="auth-link">Зарегистрироваться</a>
        </p>
        <p class="auth-footer" style="margin-top: 8px;">
            <a href="{% url 'home' %}" class="auth-link" style="font-weight: 400; color: #6b7280;">← На главную</a>
        </p>
    </div>
</section>
{% endblock %}
