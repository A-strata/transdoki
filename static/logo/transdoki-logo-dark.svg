<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 80">
  <!-- ТРАНСДОКИ — стандартная версия (тёмный фон)
       Применение: тёмный хедер, тёмная тема
       Размер: 370×80px -->
  <defs>
    <style>text { font-family: Inter, Manrope, Geometria, system-ui, -apple-system, sans-serif; }</style>
  </defs>
  <!-- Знак 80×80 — светлее на тёмном фоне -->
  <rect x="0" y="0" width="80" height="80" rx="12" fill="#185FA5"/>
  <rect x="13" y="13" width="54" height="18" rx="3" fill="white"/>
  <rect x="31" y="31" width="18" height="36" rx="3" fill="white"/>
  <!-- Вордмарк -->
  <text x="98" y="37"  font-size="34" font-weight="700" letter-spacing="0.5" fill="#FFFFFF">ТРАНС</text>
  <text x="98" y="74" font-size="34" font-weight="700" letter-spacing="0.5" fill="#85B7EB">ДОКИ</text>
</svg>
